siliconflow:
  api_key: "sk-zpgxfhiujkrzmcfplwnazrizsdzjvlrvrqwahzjifqpunshu"
  base_url: "https://api.siliconflow.cn/v1"

embedding:
  model: "BAAI/bge-m3"
  batch_size: 500

reranking:
  model: "BAAI/bge-reranker-v2-m3"
  top_k: 10

text_splitting:
  chunk_size: 800
  chunk_overlap: 100

vectorstore:
  persist_directory: "./faiss_data"
  collection_name: "knowledge_base"

retrieval:
  initial_k: 100
  similarity_threshold: 0.75

# LLM 对话配置
chat:
  model: "THUDM/glm-4-9b-chat"
  system_prompt: "你是一个知识库问答助手。请根据以下参考文档回答用户问题。如果参考文档中没有相关信息，请如实说明。\n\n参考文档：\n{context}"
  max_tokens: 2048
  temperature: 0.7

mcp:
  name: "RAG Knowledge Base"
  host: "0.0.0.0"
  port: 18001
  transport: "http"

# API 服务配置
api:
  host: "0.0.0.0"
  port: 18000
  upload_dir: "./uploads"
  max_file_size: "50MB"
  secret_key: "your-secret-key-change-in-production"  # JWT 密钥，生产环境请修改

# 管理员认证配置
auth:
  admin_username: "admin"
  admin_password: "admin123"  # 生产环境请修改为强密码
  token_expire_hours: 24
